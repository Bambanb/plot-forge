<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLOT FORGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { touch-action: manipulation; }
body {
  min-height: 100vh;
  background: #0d0b10;
  color: #e8ddd0;
  font-family: 'Noto Serif JP', serif;
  -webkit-text-size-adjust: 100%;
}
.app {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(120,20,40,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(30,60,40,0.12) 0%, transparent 50%),
    #0d0b10;
  padding: 1.2rem 1rem 4rem;
  max-width: 600px;
  margin: 0 auto;
}
.header { text-align: center; margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(180,40,60,0.3); }
.header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; color: #e8c9b0; letter-spacing: 0.15em; margin-bottom: 0.2rem; }
.header p { font-size: 0.7rem; color: rgba(232,221,208,0.3); }
.tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.3rem; margin-bottom: 1.4rem; }
.tab-btn {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(232,221,208,0.08);
  border-radius: 7px;
  color: rgba(232,221,208,0.35);
  cursor: pointer;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.65rem;
  padding: 0.55rem 0.1rem;
  touch-action: manipulation;
  line-height: 1.3;
}
.tab-btn.active { background: rgba(180,40,60,0.14); border-color: rgba(180,40,60,0.4); color: #e8c9b0; }
.section { margin-bottom: 1.3rem; }
.section-label {
  font-size: 0.68rem; letter-spacing: 0.15em; color: rgba(180,40,60,0.8);
  text-transform: uppercase; margin-bottom: 0.55rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(180,40,60,0.3), transparent); }
.hint { font-size: 0.7rem; color: rgba(232,221,208,0.28); margin-bottom: 0.5rem; line-height: 1.6; }
textarea, input[type="text"], input[type="password"] {
  display: block; width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(232,221,208,0.14);
  border-radius: 8px;
  color: #e8ddd0;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  padding: 0.85rem 0.9rem;
  outline: none; line-height: 1.75;
  -webkit-appearance: none; appearance: none;
  touch-action: manipulation; cursor: text;
}
textarea { resize: vertical; }
textarea:focus, input:focus { border-color: rgba(180,40,60,0.5); background: rgba(255,255,255,0.055); }
textarea::placeholder, input::placeholder { color: rgba(232,221,208,0.18); }
.char-hint { text-align: right; font-size: 0.63rem; color: rgba(232,221,208,0.18); margin-top: 0.2rem; }
.save-row { display: flex; gap: 0.6rem; margin-top: 0.7rem; }
.save-btn {
  flex: 1; min-height: 48px;
  background: rgba(180,40,60,0.12); border: 1px solid rgba(180,40,60,0.3);
  border-radius: 8px; color: #e8c9b0; cursor: pointer;
  font-family: 'Noto Serif JP', serif; font-size: 0.85rem; letter-spacing: 0.08em;
  touch-action: manipulation;
}
.save-btn.danger { flex: 0 0 auto; padding: 0 1rem; background: rgba(60,60,60,0.15); border-color: rgba(232,221,208,0.1); color: rgba(232,221,208,0.3); font-size: 0.78rem; }
.saved-badge { font-size: 0.7rem; color: rgba(160,200,160,0.7); text-align: center; margin-top: 0.45rem; }
.selects-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
.select-group label { display: block; font-size: 0.67rem; letter-spacing: 0.1em; color: rgba(232,221,208,0.32); margin-bottom: 0.32rem; }
select {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(232,221,208,0.12);
  border-radius: 8px; color: #e8ddd0; font-family: 'Noto Serif JP', serif; font-size: 16px;
  padding: 0.75rem 0.8rem; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; touch-action: manipulation;
}
.primary-btn {
  width: 100%; min-height: 56px;
  background: linear-gradient(135deg, rgba(150,22,44,0.95), rgba(110,16,34,0.95));
  border: 1px solid rgba(180,40,60,0.45); border-radius: 8px;
  color: #e8c9b0; cursor: pointer; font-family: 'Noto Serif JP', serif;
  font-size: 1rem; letter-spacing: 0.14em; margin-bottom: 1.4rem; touch-action: manipulation;
}
.primary-btn:disabled { opacity: 0.45; }
.error-box { background: rgba(180,40,60,0.08); border: 1px solid rgba(180,40,60,0.25); border-radius: 8px; color: rgba(232,180,180,0.85); font-size: 0.82rem; padding: 0.85rem 1rem; line-height: 1.8; margin-bottom: 1rem; }
.results-area { display: flex; flex-direction: column; gap: 1rem; }
.plot-card { background: rgba(255,255,255,0.025); border: 1px solid rgba(232,221,208,0.08); border-radius: 10px; padding: 1.1rem 1rem 0.9rem; animation: fadeIn 0.35s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.plot-number { font-family:'Cormorant Garamond',serif; font-size:0.66rem; letter-spacing:0.2em; color:rgba(180,40,60,0.55); margin-bottom:0.45rem; }
.plot-title { font-family:'Cormorant Garamond',serif; font-size:1.12rem; color:#e8c9b0; font-weight:600; line-height:1.4; margin-bottom:0.6rem; }
.plot-hook { font-size:0.81rem; color:rgba(232,221,208,0.48); font-style:italic; margin-bottom:0.8rem; padding-left:0.7rem; border-left:2px solid rgba(180,40,60,0.3); line-height:1.75; }
.plot-body { font-size:0.84rem; line-height:2; color:rgba(232,221,208,0.78); margin-bottom:0.8rem; }
.plot-memo { width:100%; background:rgba(255,255,255,0.02); border:1px solid rgba(232,221,208,0.08); border-radius:6px; color:rgba(232,221,208,0.6); font-family:'Noto Serif JP',serif; font-size:14px; padding:0.6rem 0.8rem; resize:none; outline:none; line-height:1.7; margin-bottom:0.7rem; }
.plot-footer { display:flex; align-items:flex-end; gap:0.5rem; flex-wrap:wrap; }
.plot-tags { display:flex; flex-wrap:wrap; gap:0.3rem; flex:1; }
.plot-tag { background:rgba(30,60,40,0.2); border:1px solid rgba(60,120,80,0.2); border-radius:3px; font-size:0.65rem; color:rgba(160,200,160,0.55); padding:0.1rem 0.4rem; }
.btn-row { display:flex; gap:0.4rem; }
.icon-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(232,221,208,0.1); border-radius:5px; color:rgba(232,221,208,0.35); cursor:pointer; font-family:'Noto Serif JP',serif; font-size:0.72rem; padding:0.3rem 0.7rem; white-space:nowrap; min-height:36px; touch-action:manipulation; }
.icon-btn.saved { border-color:rgba(160,200,160,0.4); color:rgba(160,200,160,0.7); }
.status-bar { font-size:0.67rem; color:rgba(232,221,208,0.2); text-align:center; margin-top:0.7rem; }
.status-badge { font-size:0.7rem; color:rgba(160,200,160,0.55); margin-bottom:0.8rem; }
.chat-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem; }
.chat-save-status { font-size:0.68rem; color:rgba(160,200,160,0.6); }
.chat-messages { margin-bottom:0.8rem; min-height:60px; }
.chat-msg { font-size:0.85rem; line-height:1.85; margin-bottom:0.7rem; white-space:pre-wrap; word-break:break-word; animation:fadeIn 0.3s ease both; }
.chat-msg.user { background:rgba(180,40,60,0.07); border-left:2px solid rgba(180,40,60,0.3); border-radius:0 7px 7px 0; color:rgba(232,221,208,0.65); padding:0.7rem 0.9rem; font-size:0.81rem; }
.chat-msg.assistant { background:rgba(255,255,255,0.025); border:1px solid rgba(232,221,208,0.07); border-radius:8px; color:rgba(232,221,208,0.85); padding:0.85rem 0.95rem; }
.chat-msg.thinking { color:rgba(232,221,208,0.28); font-style:italic; font-size:0.78rem; padding:0.4rem 0.5rem; }
.chat-input-row { display:flex; gap:0.55rem; align-items:flex-end; }
.chat-input-row input[type="text"] { flex:1; min-height:52px; }
.send-btn { min-width:52px; min-height:52px; background:rgba(180,40,60,0.2); border:1px solid rgba(180,40,60,0.4); border-radius:8px; color:#e8c9b0; cursor:pointer; font-size:1.2rem; flex-shrink:0; touch-action:manipulation; }
.send-btn:disabled { opacity:0.35; }
.new-chat-btn { background:none; border:1px solid rgba(232,221,208,0.1); border-radius:6px; color:rgba(232,221,208,0.3); cursor:pointer; font-family:'Noto Serif JP',serif; font-size:0.7rem; padding:0.3rem 0.7rem; touch-action:manipulation; }
.history-empty { font-size:0.82rem; color:rgba(232,221,208,0.25); text-align:center; padding:2rem 0; line-height:2; }
.history-sub-tabs { display:grid; grid-template-columns:1fr 1fr; gap:0.4rem; margin-bottom:1rem; }
.history-item { background:rgba(255,255,255,0.02); border:1px solid rgba(232,221,208,0.07); border-radius:8px; margin-bottom:0.8rem; overflow:hidden; }
.history-header { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1rem; cursor:pointer; touch-action:manipulation; }
.history-title { font-size:0.82rem; color:rgba(232,221,208,0.6); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:0.5rem; }
.history-date { font-size:0.65rem; color:rgba(232,221,208,0.25); margin-right:0.4rem; white-space:nowrap; }
.history-toggle { font-size:0.7rem; color:rgba(232,221,208,0.25); }
.history-body { border-top:1px solid rgba(232,221,208,0.06); padding:0.9rem 1rem; }
.history-msg { font-size:0.8rem; line-height:1.8; margin-bottom:0.6rem; white-space:pre-wrap; word-break:break-word; }
.history-msg.user { color:rgba(232,221,208,0.45); font-style:italic; }
.history-msg.assistant { color:rgba(232,221,208,0.75); }
.history-del { background:none; border:none; color:rgba(232,221,208,0.18); cursor:pointer; font-size:0.68rem; margin-top:0.5rem; touch-action:manipulation; }
.saved-plot-item { background:rgba(255,255,255,0.02); border:1px solid rgba(232,221,208,0.07); border-radius:8px; padding:0.9rem 1rem; margin-bottom:0.8rem; }
.saved-plot-title { font-family:'Cormorant Garamond',serif; font-size:1rem; color:#e8c9b0; margin-bottom:0.4rem; }
.saved-plot-date { font-size:0.65rem; color:rgba(232,221,208,0.25); margin-bottom:0.5rem; }
.saved-plot-body { font-size:0.8rem; color:rgba(232,221,208,0.6); line-height:1.85; margin-bottom:0.5rem; white-space:pre-wrap; }
.saved-plot-memo { font-size:0.78rem; color:rgba(180,40,60,0.55); font-style:italic; line-height:1.7; margin-bottom:0.5rem; white-space:pre-wrap; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>PLOT FORGE</h1>
    <p>プロット生成 · 設定管理 · 校閲チャット · 履歴</p>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>

<script>
// ── localStorage helpers ──
const LS = {
  get: k => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); return true; } catch { return false; } },
  del: k => { try { localStorage.removeItem(k); return true; } catch { return false; } },
  keys: prefix => { try { return Object.keys(localStorage).filter(k => k.startsWith(prefix)); } catch { return []; } }
};

const SK = { apiKey: 'pf-apikey', settings: 'pf-settings', chatPrefix: 'pf-chat:', plotPrefix: 'pf-plot:' };

function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── State ──
let state = {
  tab: 'plot',
  apiKey: LS.get(SK.apiKey) || '',
  settings: LS.get(SK.settings) || '',
  keywords: '', synopsis: '', tone: 'dark', count: '3',
  plotLoading: false, plotResults: [], plotMemos: {}, plotError: '', savedPlotIds: {}, copied: null,
  manuscript: '', chatInput: '', chatHistory: [], chatLoading: false, chatError: '',
  chatSaveStatus: '', currentChatKey: null,
  historyTab: 'chat', expandedLog: null,
  chatLogs: [], savedPlots: []
};

const toneMap = { dark:'重く暗い、救いのない', bitter:'ビターエンド、諦念、静かな痛み', complex:'複雑で多面的、善悪が曖昧', tense:'心理的緊張、追い詰められる感覚' };

async function callAPI(system, messages, maxTokens = 3000) {
  const key = state.apiKey.trim();
  if (!key) throw new Error('APIキーが設定されていません（⚙設定タブで入力してください）');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens, system, messages })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `APIエラー ${res.status}`); }
  const data = await res.json();
  return data.content.map(b => b.text || '').join('');
}

function parseJSON(raw) {
  const cleaned = raw.replace(/```json|```/g, '').trim();
  const match = cleaned.match(/\[[\s\S]*\]/);
  if (!match) throw new Error('JSON形式が見つかりません');
  return JSON.parse(match[0]);
}

function render() {
  renderTabs();
  const content = document.getElementById('content');
  if (state.tab === 'apikey') content.innerHTML = renderAPIKey();
  else if (state.tab === 'settings') content.innerHTML = renderSettings();
  else if (state.tab === 'plot') content.innerHTML = renderPlot();
  else if (state.tab === 'review') content.innerHTML = renderReview();
  else if (state.tab === 'history') content.innerHTML = renderHistory();
  bindEvents();
}

function renderTabs() {
  const tabs = [['apikey','🔑 API'],['settings','⚙ 設定'],['plot','✦ プロット'],['review','✎ 校閲'],['history','📂 履歴']];
  document.getElementById('tabs').innerHTML = tabs.map(([id, label]) =>
    `<button class="tab-btn ${state.tab===id?'active':''}" onclick="setTab('${id}')">${label}</button>`
  ).join('');
}

function renderAPIKey() {
  const masked = state.apiKey ? state.apiKey.slice(0,10) + '...' : '';
  return `
    <div class="section">
      <div class="section-label">APIキー</div>
      <p class="hint">Anthropic ConsoleのAPIキーを入力して保存してください。端末内にのみ保存されます。</p>
      <input type="password" id="apikey-input" placeholder="sk-ant-api03-..." value="${state.apiKey}" autocomplete="off">
      <div class="save-row">
        <button class="save-btn" onclick="saveAPIKey()">保存する</button>
        ${state.apiKey ? `<button class="save-btn danger" onclick="clearAPIKey()">削除</button>` : ''}
      </div>
      ${state.apiKey ? `<div class="saved-badge">✓ APIキー保存済み（${masked}）</div>` : ''}
    </div>
  `;
}

function renderSettings() {
  return `
    <div class="section">
      <div class="section-label">キャラ設定・世界観</div>
      <p class="hint">保存するとプロット・校閲チャットで自動参照されます。端末内に永続保存されます。</p>
      <textarea rows="10" id="settings-input" placeholder="例：&#10;皇紀×颯。&#10;皇紀は捕食者的な性格で颯に静かに執着。感情を直接表現せず行動で示す。&#10;颯は表面淡々・内面激しい。皇紀の意図に気づきながら距離を測っている。" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">${escHtml(state.settings)}</textarea>
      <div class="char-hint">${state.settings.length}字</div>
      <div class="save-row">
        <button class="save-btn" onclick="saveSettings()">保存する</button>
        ${state.settings ? `<button class="save-btn danger" onclick="clearSettings()">削除</button>` : ''}
      </div>
      ${state.settings ? `<div class="saved-badge">✓ 設定保存済み</div>` : ''}
    </div>
  `;
}

function renderPlot() {
  const hasSaved = !!state.settings;
  return `
    ${hasSaved ? '<div class="status-badge">✓ 保存済み設定を使用中</div>' : ''}
    <div class="section">
      <div class="section-label">キーワード</div>
      <input type="text" id="keywords-input" placeholder="例：再会、嫉妬、秘密を知る、裏切り" value="${escHtml(state.keywords)}" autocomplete="off">
    </div>
    <div class="section">
      <div class="section-label">あらすじメモ（任意）</div>
      <textarea rows="4" id="synopsis-input" placeholder="書きたい場面やアイデアのメモ。箇条書きでもOK" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">${escHtml(state.synopsis)}</textarea>
    </div>
    <div class="selects-row">
      <div class="select-group">
        <label>雰囲気</label>
        <select id="tone-select" onchange="state.tone=this.value">
          ${['dark','bitter','complex','tense'].map(v => `<option value="${v}" ${state.tone===v?'selected':''}>${{dark:'重く暗い',bitter:'ビターエンド',complex:'複雑・多面的',tense:'心理的緊張'}[v]}</option>`).join('')}
        </select>
      </div>
      <div class="select-group">
        <label>生成数</label>
        <select id="count-select" onchange="state.count=this.value">
          ${['2','3','5'].map(v => `<option value="${v}" ${state.count===v?'selected':''}>${v}案</option>`).join('')}
        </select>
      </div>
    </div>
    <button class="primary-btn" onclick="generatePlot()" ${state.plotLoading?'disabled':''}>
      ${state.plotLoading ? '生成中…' : 'プロット生成'}
    </button>
    ${state.plotError ? `<div class="error-box">${escHtml(state.plotError)}</div>` : ''}
    ${state.plotResults.length > 0 ? `
      <div class="results-area">
        ${state.plotResults.map((p, i) => `
          <div class="plot-card">
            <div class="plot-number">PLOT ${String(i+1).padStart(2,'0')}</div>
            <div class="plot-title">${escHtml(p.title)}</div>
            ${p.hook ? `<div class="plot-hook">${escHtml(p.hook)}</div>` : ''}
            <div class="plot-body">${escHtml(p.plot)}</div>
            <textarea class="plot-memo" rows="2" placeholder="メモ・手直しアイデアを追記…" oninput="state.plotMemos[${i}]=this.value" autocorrect="off" spellcheck="false">${escHtml(state.plotMemos[i]||'')}</textarea>
            <div class="plot-footer">
              <div class="plot-tags">${(p.tags||[]).map(t=>`<span class="plot-tag">${escHtml(t)}</span>`).join('')}</div>
              <div class="btn-row">
                <button class="icon-btn" onclick="copyPlot(${i})">${state.copied===i?'✓':'コピー'}</button>
                <button class="icon-btn ${state.savedPlotIds[i]?'saved':''}" onclick="savePlot(${i})">${state.savedPlotIds[i]?'✓ 保存済':'保存'}</button>
              </div>
            </div>
          </div>
        `).join('')}
        <div class="status-bar">${state.plotResults.length}件生成　— 再生成で別パターンも</div>
      </div>
    ` : ''}
  `;
}

function renderReview() {
  return `
    ${state.settings ? '<div class="status-badge">✓ 保存済み設定を使用中</div>' : ''}
    <div class="chat-header">
      <div>${state.chatSaveStatus==='saved'?'<span class="chat-save-status">✓ 保存しました</span>':''}</div>
      <div class="btn-row">
        ${state.chatHistory.length>0?`<button class="new-chat-btn" onclick="saveChat()">保存</button>`:''}
        <button class="new-chat-btn" onclick="startNewChat()">新しい会話</button>
      </div>
    </div>
    ${state.chatHistory.length===0 ? `
      <div class="section">
        <div class="section-label">原稿（任意）</div>
        <p class="hint">チェックしたい文章を貼り付け。最初のメッセージと一緒に送られます</p>
        <textarea rows="7" id="manuscript-input" placeholder="原稿をここに…" autocorrect="off" autocapitalize="off" spellcheck="false">${escHtml(state.manuscript)}</textarea>
        ${state.manuscript.length>0?`<div class="char-hint">${state.manuscript.length}字</div>`:''}
      </div>
    ` : ''}
    <div class="chat-messages" id="chat-messages">
      ${state.chatHistory.map(m=>`<div class="chat-msg ${m.role}">${escHtml(m.content)}</div>`).join('')}
      ${state.chatLoading?'<div class="chat-msg thinking">考え中…</div>':''}
      ${state.chatError?`<div class="error-box">${escHtml(state.chatError)}</div>`:''}
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="${state.chatHistory.length===0?'「この文章どう思う？」など話しかけて':'返信を入力…'}" value="${escHtml(state.chatInput)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="send-btn" onclick="sendChat()" ${state.chatLoading||!state.chatInput.trim()?'disabled':''}>↑</button>
    </div>
  `;
}

function renderHistory() {
  return `
    <div class="history-sub-tabs">
      <button class="tab-btn ${state.historyTab==='chat'?'active':''}" onclick="state.historyTab='chat';render()">校閲ログ</button>
      <button class="tab-btn ${state.historyTab==='plot'?'active':''}" onclick="state.historyTab='plot';loadSavedPlots();render()">保存プロット</button>
    </div>
    ${state.historyTab==='chat' ? renderChatLogs() : renderSavedPlots()}
  `;
}

function renderChatLogs() {
  if (state.chatLogs.length===0) return '<div class="history-empty">校閲チャットの履歴はまだありません<br>「保存」ボタンから保存できます</div>';
  return state.chatLogs.map(log => `
    <div class="history-item">
      <div class="history-header" onclick="toggleLog('${log.key}')">
        <span class="history-title">${escHtml(log.title)}</span>
        <span class="history-date">${fmtDate(log.ts)}</span>
        <span class="history-toggle">${state.expandedLog===log.key?'▲':'▼'}</span>
      </div>
      ${state.expandedLog===log.key ? `
        <div class="history-body">
          ${(log.messages||[]).map(m=>`<div class="history-msg ${m.role}">${m.role==='user'?'› ':''}${escHtml(m.content)}</div>`).join('')}
          <button class="history-del" onclick="deleteChatLog('${log.key}')">この履歴を削除</button>
        </div>
      ` : ''}
    </div>
  `).join('');
}

function renderSavedPlots() {
  if (state.savedPlots.length===0) return '<div class="history-empty">保存したプロットはまだありません<br>プロットタブの「保存」ボタンから保存できます</div>';
  return state.savedPlots.map(p => `
    <div class="saved-plot-item">
      <div class="saved-plot-title">${escHtml(p.title)}</div>
      <div class="saved-plot-date">${fmtDate(p.ts)}</div>
      ${p.hook?`<div class="saved-plot-memo">${escHtml(p.hook)}</div>`:''}
      <div class="saved-plot-body">${escHtml(p.plot)}</div>
      ${p.memo?`<div class="saved-plot-memo">📝 ${escHtml(p.memo)}</div>`:''}
      <div style="display:flex;justify-content:flex-end">
        <button class="history-del" onclick="deleteSavedPlot('${p.key}')">削除</button>
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindEvents() {
  const si = document.getElementById('settings-input');
  if (si) si.addEventListener('input', e => { state.settings = e.target.value; document.querySelector('.char-hint') && (document.querySelector('.char-hint').textContent = state.settings.length + '字'); });
  const ki = document.getElementById('keywords-input');
  if (ki) ki.addEventListener('input', e => state.keywords = e.target.value);
  const syi = document.getElementById('synopsis-input');
  if (syi) syi.addEventListener('input', e => state.synopsis = e.target.value);
  const mi = document.getElementById('manuscript-input');
  if (mi) mi.addEventListener('input', e => state.manuscript = e.target.value);
  const ci = document.getElementById('chat-input');
  if (ci) {
    ci.addEventListener('input', e => { state.chatInput = e.target.value; document.querySelector('.send-btn') && (document.querySelector('.send-btn').disabled = state.chatLoading || !state.chatInput.trim()); });
    ci.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); if (!state.chatLoading && state.chatInput.trim()) sendChat(); } });
  }
  const aki = document.getElementById('apikey-input');
  if (aki) aki.addEventListener('input', e => state.apiKey = e.target.value);
  // scroll chat
  const cm = document.getElementById('chat-messages');
  if (cm) cm.scrollTop = cm.scrollHeight;
}

function setTab(tab) {
  state.tab = tab;
  if (tab === 'history') { loadChatLogs(); loadSavedPlots(); }
  render();
}

function saveAPIKey() {
  LS.set(SK.apiKey, state.apiKey.trim());
  render();
}
function clearAPIKey() { state.apiKey = ''; LS.del(SK.apiKey); render(); }

function saveSettings() { LS.set(SK.settings, state.settings); render(); }
function clearSettings() { state.settings = ''; LS.del(SK.settings); render(); }

async function generatePlot() {
  if (!state.keywords && !state.synopsis) { state.plotError = 'キーワードかあらすじを入力してください'; render(); return; }
  state.plotLoading = true; state.plotError = ''; state.plotResults = []; state.plotMemos = {}; state.savedPlotIds = {};
  render();
  const base = state.settings;
  const prompt = [
    base?.trim() ? `【キャラクター設定・世界観】\n${base.trim()}` : '',
    `以下の条件でBL二次創作小説のプロット案を${state.count}つ生成してください。\n【キーワード】${state.keywords||'（なし）'}\n【あらすじメモ】${state.synopsis||'（なし）'}\n【雰囲気】${toneMap[state.tone]}\n${base?.trim()?'上記の設定を必ず反映してください。':''}\n以下のJSON配列のみを返してください（説明文不要）：\n[{"title":"タイトル（20字以内）","hook":"冒頭の引き（50字程度）","plot":"概要（200〜300字）","tags":["タグ3〜5個"]}]`
  ].filter(Boolean).join('\n\n');
  try {
    const raw = await callAPI('あなたはBL二次創作小説の優秀なプロット作家です。ハッピーエンドにこだわらず、複雑な人間関係・感情の揺れ・執着・喪失を得意とします。必ずJSONのみを返し、説明文・前置き・コードブロック記号は不要です。', [{role:'user',content:prompt}]);
    state.plotResults = parseJSON(raw);
  } catch(e) { state.plotError = e.message || '生成に失敗しました'; }
  state.plotLoading = false;
  render();
}

function copyPlot(i) {
  const p = state.plotResults[i];
  const t = `■ ${p.title}\n\n${p.hook}\n\n${p.plot}\n\nタグ：${(p.tags||[]).join('、')}`;
  navigator.clipboard?.writeText(t).then(() => { state.copied = i; render(); setTimeout(() => { state.copied = null; render(); }, 1500); }).catch(()=>{});
}

function savePlot(i) {
  const p = state.plotResults[i];
  const memo = state.plotMemos[i] || '';
  const ts = Date.now();
  const key = `${SK.plotPrefix}${ts}`;
  LS.set(key, JSON.stringify({ ts, title: p.title, plot: p.plot, hook: p.hook, tags: p.tags, memo }));
  state.savedPlotIds[i] = true;
  render();
}

function saveChat() {
  if (state.chatHistory.length < 2) return;
  const ts = state.currentChatKey ? parseInt(state.currentChatKey.replace(SK.chatPrefix,'')) : Date.now();
  const key = state.currentChatKey || `${SK.chatPrefix}${ts}`;
  const firstUser = state.chatHistory.find(m=>m.role==='user')?.content || '会話';
  const title = firstUser.slice(0,30) + (firstUser.length>30?'…':'');
  const ok = LS.set(key, JSON.stringify({ ts, title, messages: state.chatHistory }));
  if (!state.currentChatKey) state.currentChatKey = key;
  state.chatSaveStatus = ok ? 'saved' : '';
  render();
  setTimeout(() => { state.chatSaveStatus = ''; render(); }, 2000);
}

async function sendChat() {
  const input = state.chatInput.trim();
  if (!input) return;
  state.chatHistory = [...state.chatHistory, {role:'user', content:input}];
  state.chatInput = ''; state.chatLoading = true; state.chatError = '';
  render();
  const system = [
    'あなたはBL二次創作小説の編集者として、作者と対話しながら文章を改善します。',
    'ハッピーエンドにこだわらない複雑な感情表現・抑制的な文体・心理描写を得意とします。',
    '登場人物は全員男性です。BL作品です。',
    '指示がない限り文章を丸ごと書き直しません。作者の文体・意図を尊重し、具体的な指摘と提案を行います。',
    '会話口調で、気軽に話しかけてください。',
    state.settings?.trim() ? `\n【作品の設定・世界観】\n${state.settings.trim()}` : ''
  ].filter(Boolean).join('\n');
  const messages = state.chatHistory.map((m,i) => ({
    role: m.role,
    content: i===0 && state.manuscript.trim() ? `【原稿】\n${state.manuscript.trim()}\n\n${m.content}` : m.content
  }));
  try {
    const reply = await callAPI(system, messages, 2000);
    state.chatHistory = [...state.chatHistory, {role:'assistant', content:reply}];
    // 自動保存
    saveChat();
  } catch(e) {
    state.chatError = e.message || '送信に失敗しました';
    state.chatHistory = state.chatHistory.slice(0,-1);
  }
  state.chatLoading = false;
  render();
}

function startNewChat() { state.chatHistory = []; state.manuscript = ''; state.chatError = ''; state.chatInput = ''; state.currentChatKey = null; state.chatSaveStatus = ''; render(); }

function loadChatLogs() {
  const keys = LS.keys(SK.chatPrefix);
  const logs = [];
  for (const k of keys) { try { logs.push({key:k,...JSON.parse(LS.get(k))}); } catch {} }
  state.chatLogs = logs.sort((a,b)=>b.ts-a.ts);
}

function loadSavedPlots() {
  const keys = LS.keys(SK.plotPrefix);
  const plots = [];
  for (const k of keys) { try { plots.push({key:k,...JSON.parse(LS.get(k))}); } catch {} }
  state.savedPlots = plots.sort((a,b)=>b.ts-a.ts);
}

function toggleLog(key) { state.expandedLog = state.expandedLog===key ? null : key; render(); }
function deleteChatLog(key) { LS.del(key); loadChatLogs(); render(); }
function deleteSavedPlot(key) { LS.del(key); loadSavedPlots(); render(); }

// 初期化
render();
</script>
</body>
</html>
